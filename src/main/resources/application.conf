akka {
  loglevel = "INFO"
  
  actor {
    provider = "local"
  }
  
  # Disable warning messages
  coordinated-shutdown {
    exit-jvm = on
  }
}

cinnamon {
  akka.actors = {
    default-by-class {
      includes = "/user/*"
      report-by = class
    }
  }
}

sim {
  seed = 5532026

  run {
    durationSeconds = 10
  }

  messages {
    types = [ "CONTROL", "PING", "GOSSIP", "WORK", "ACK" ]
  }

  algorithms {
    enabled = [ "echo", "wave" ]
    initiatorNode = 0
  }

  edgeLabeling {
    default = [ "CONTROL", "PING" ]

    overrides = [
      { from = 0, to = 1, allow = [ "CONTROL", "PING", "WORK" ] }
    ]
  }

  traffic {
    defaultPdf = [
      { msg = "PING", p = 0.50 },
      { msg = "GOSSIP", p = 0.30 },
      { msg = "WORK", p = 0.20 }
    ]

    perNodePdf = [
      { node = 0, pdf = [ { msg = "WORK", p = 0.70 }, { msg = "PING", p = 0.20 }, { msg = "GOSSIP", p = 0.10 } ] }
    ]
  }

  initiators {
    timers = [
      { node = 0, tickEveryMs = 500, mode = "pdf" }
    ]

    inputs = [
      { node = 0 }
    ]
  }
}
